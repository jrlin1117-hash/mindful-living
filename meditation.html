<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>冥想练习 - 正念小森林</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="app">
    <main class="page-shell page-shell-narrow">
      <header class="page-hero meditation-page-hero">
        <div class="brand-hero-top">
          <span class="brand-pill">MINDFUL FOREST</span>
          <span class="brand-dot" aria-hidden="true"></span>
        </div>

        <div class="page-hero-copy">
          <p class="brand-kicker">Quiet practice</p>
          <h1 class="page-hero-title">冥想练习</h1>
          <p class="page-hero-text">给自己一段安静、不需要表现的时间。选择时长，坐定，呼吸，让这一段时间只属于你和此刻。</p>
        </div>

        <nav class="hero-nav">
          <a href="./index.html" class="mini-link">首页</a>
          <a href="./forest.html" class="mini-link">进入森林</a>
        </nav>
      </header>

      <section class="card timer-card meditation-card">
        <div class="timer-circle">
          <div class="timer-inner">
            <p class="eyebrow text-muted">剩余时间</p>
            <strong id="timer-display" class="timer-display">05:00</strong>
          </div>
        </div>

        <div class="stack-md">
          <div class="pill-row">
            <button class="preset preset-active" data-seconds="300" type="button">5 分钟</button>
            <button class="preset" data-seconds="600" type="button">10 分钟</button>
            <button class="preset" data-seconds="900" type="button">15 分钟</button>
          </div>

          <div class="button-grid">
            <button id="start-timer" class="btn btn-primary" type="button">开始</button>
            <button id="pause-timer" class="btn btn-secondary" type="button">暂停</button>
            <button id="reset-timer" class="btn btn-secondary" type="button">重置</button>
          </div>

          <p id="timer-status" class="body-sm">给自己一个不需要完成什么的时段，只是坐下来呼吸。</p>
        </div>
      </section>

      <dialog id="meditation-dialog" class="dialog-shell">
        <article class="card dialog-card">
          <div class="card-body stack-md">
            <div class="stack-sm">
              <p class="eyebrow">Practice Complete</p>
              <h2 class="title-lg">记录这次练习</h2>
              <p class="body-sm">简单写下此刻的身体、情绪或一个被你注意到的细节。</p>
            </div>

            <textarea
              id="meditation-note"
              class="input-area"
              rows="4"
              placeholder="比如：练习后呼吸慢了一点，肩膀也放松了。"
            ></textarea>

            <div class="button-grid">
              <button id="save-meditation-record" class="btn btn-primary" type="button">保存记录并浇灌</button>
              <button id="skip-meditation-record" class="btn btn-secondary" type="button">暂不记录</button>
            </div>
          </div>
        </article>
      </dialog>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
