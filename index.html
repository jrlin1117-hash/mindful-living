<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIED挑战性任务</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="challenge-app">
    <main class="challenge-page">
      <header class="challenge-header">
        <p class="challenge-kicker">PARTY CHALLENGE</p>
        <h1>MIED挑战性任务</h1>
        <p class="challenge-subtitle">社恐大挑战</p>
      </header>

      <section class="challenge-stage" aria-label="挑战转盘">
        <div class="wheel-wrap">
          <div class="wheel-pointer" aria-hidden="true"></div>

          <div id="challenge-wheel" class="challenge-wheel" aria-live="polite">
            <div id="wheel-labels" class="wheel-labels"></div>
          </div>
          <button id="spin-button" class="spin-button" type="button">开始转盘</button>
        </div>

        <div class="challenge-controls">
          <button id="shuffle-button" class="challenge-button secondary" type="button">换一组挑战</button>
          <button id="respin-button" class="challenge-button primary" type="button">再转一次</button>
        </div>
      </section>

      <section id="result-card" class="result-card" aria-live="polite" hidden>
        <p class="result-eyebrow">🎯 你的挑战是：</p>
        <h2 id="result-title">等待抽取</h2>
        <div class="result-action">
          <span>具体行动：</span>
          <p id="result-action">点击开始转盘，抽取今天的社恐挑战。</p>
        </div>
      </section>

      <p class="safety-note">
        挑战请注意安全、尊重他人边界，不打扰他人正常生活。如对方拒绝或表现出不适，请立刻停止并礼貌离开。
      </p>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
