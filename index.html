<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正念小森林</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="app app-home">
    <main class="page-center">
      <section class="card home-card">
        <div class="stack-lg text-center">
          <p class="eyebrow">Mindful Forest</p>
          <h1 class="title-xl">正念小森林</h1>
          <p class="body-sm">
            正念是一种生活态度。<br />
            在日常里，种下觉察
          </p>
        </div>

        <div class="stack-md">
          <button id="draw-attitude" type="button" class="btn btn-primary">抽取今日态度卡</button>
          <a href="./meditation.html" class="btn btn-secondary">冥想练习</a>
          <a href="./forest.html" class="btn btn-secondary">进入森林</a>
        </div>
      </section>
    </main>

    <dialog id="attitude-dialog" class="dialog-shell">
      <article class="card dialog-card">
        <div id="plant-backdrop" class="dialog-cover"></div>
        <div class="card-body stack-md">
          <div class="stack-sm">
            <p id="today-plant" class="eyebrow text-muted">今日植物</p>
            <h2 id="today-attitude-name" class="title-lg">等待抽卡</h2>
            <p id="today-attitude-line" class="body-sm">森林正在为你准备今天的态度卡。</p>
          </div>

          <div class="stack-md">
            <div class="stack-xs">
              <span class="eyebrow text-muted">一句介绍</span>
              <p id="today-attitude-intro" class="body-sm">每一种正念态度，都可以在今天的生活里找到一个落点。</p>
            </div>

            <div class="stack-xs">
              <span class="eyebrow text-muted">行动建议</span>
              <p id="today-attitude-action" class="body-sm">抽卡后，这里会出现一个轻量、具体、可以立刻开始的小练习。</p>
            </div>
          </div>

          <button id="close-dialog" type="button" class="btn btn-secondary">收起卡片</button>
        </div>
      </article>
    </dialog>

    <script src="./script.js"></script>
  </body>
</html>
